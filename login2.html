<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameXchange - Criar Conta</title>
    <link rel="stylesheet" href="./Assets/Css/login2.css">
    <script src="./Assets/Js/login2.js"></script>
</head>
<body>
    <div class="login2-container">
        <div class="form-box">
            <img src="./Assets/Img/Logo.png" alt="GameXchange" class="logo">
            <h2>Criar conta</h2>
            <p>Insira sua data de nascimento</p>
            <div class="dob-inputs">
                <select id="dia">
                    <option>Dia</option>
                </select>
                <select id="mes">
                    <option>Mês</option>
                </select>
                <input type="text" id="ano" placeholder="Ano">
            </div>
            <button id="continuar">Continuar</button>
            <p class="login-text">Já tem uma conta? <a href="login1.html" class="Registrar">Entrar</a>
        </div>
    </div>
</body>
</html>
